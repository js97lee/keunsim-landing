<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>큰심 - 매일 카톡으로 지식 한 입</title>
    <meta
      name="description"
      content="큰심은 영어, 경제, AI, 교양 콘텐츠를 카카오톡으로 매일 받아보는 모바일 구독권 랜딩 페이지입니다."
    />
    <meta property="og:title" content="큰심 - 매일 카톡으로 지식 한 입" />
    <meta property="og:description" content="지금 나에게 가장 필요한 데일리 콘텐츠를 골라 카톡으로 받아보세요." />
    <meta property="og:type" content="website" />
    <link rel="stylesheet" href="./styles.css?v=orange-brown-system-v1" />
  </head>
  <body>
    <div class="mobile-page">
      <header class="app-header">
        <a class="brand" href="#top" aria-label="큰심 홈">
          <span class="brand-symbol"></span>
          큰심
        </a>
        <nav class="header-actions" aria-label="상단 메뉴">
          <a class="cart" href="#plans" aria-label="장바구니"></a>
          <button class="menu" type="button" aria-label="메뉴 열기"><span></span><span></span></button>
        </nav>
      </header>

      <main id="top">
        <section class="hero">
          <div class="hero-copy">
            <h1>매일 카톡으로<br />지식 한 입, 큰심</h1>
            <div class="topic-pills" id="topic-pills" aria-label="콘텐츠 주제"></div>
          </div>
          <div class="phone-art" aria-hidden="true">
            <div class="phone-screen"></div>
          </div>
          <div class="toast">
            <span class="toast-dot"></span>
            <b>큰심</b>
            <small>오늘의 구독권 도착했습니다.</small>
          </div>
        </section>

        <nav class="shortcut" id="shortcut" aria-label="카테고리 바로가기"></nav>

        <div id="content-catalog"></div>

        <section class="purchase" id="plans">
          <h2>큰심 구독 시작하기</h2>
          <p>카카오싱크로 가입하고, 채널 추가 후 첫 샘플을 바로 받아보세요.</p>
          <div class="plan-row">
            <a href="#checkout"><b>7일 무료체험</b><span>0원</span></a>
            <a href="#checkout" class="active"><b>월간 구독권</b><span>4,900원~</span></a>
          </div>
        </section>

        <section class="checkout" id="checkout">
          <h2>구독 정보 선택</h2>
          <form>
            <label>
              받고 싶은 콘텐츠
              <select>
                <option>경제뉴스 5줄 요약</option>
                <option>하루 영어 표현 3개</option>
                <option>AI 트렌드 3줄 브리핑</option>
                <option>재테크 기초 입문</option>
              </select>
            </label>
            <label>
              카톡 발송 시간
              <select>
                <option>오전 8:00</option>
                <option>오전 9:00</option>
                <option>점심 12:00</option>
                <option>저녁 8:00</option>
              </select>
            </label>
            <div class="checks">
              <label><input type="checkbox" checked /> 이용약관 동의</label>
              <label><input type="checkbox" checked /> 개인정보 처리 동의</label>
              <label><input type="checkbox" /> 광고성 정보 수신 동의</label>
            </div>
            <button type="button">카카오로 가입하고 결제하기</button>
          </form>
        </section>
      </main>

      <footer class="footer">
        <a class="brand footer-brand" href="#top">
          <span class="brand-symbol"></span>
          큰심
        </a>
        <p>매일 아침, 당신의 성장을 위한 한 입</p>
        <details>
          <summary>서비스</summary>
          <a href="#all">전체 콘텐츠</a>
          <a href="#plans">구독권 보기</a>
        </details>
        <details>
          <summary>정책</summary>
          <a href="#checkout">이용약관</a>
          <a href="#checkout">개인정보처리방침</a>
        </details>
        <details>
          <summary>고객센터</summary>
          <a href="mailto:hello@keunsim.kr">hello@keunsim.kr</a>
        </details>
        <small>© 2026 큰심. All rights reserved.</small>
      </footer>
    </div>

    <a class="help" href="#checkout" aria-label="도움말">?</a>
    <script src="./script.js?v=components-v1" defer></script>
  </body>
</html>
